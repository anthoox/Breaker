          onclick="my_modal_1.showModal()"
        >

        </button>
        <dialog id="my_modal_1" class="modal">
          <div class="modal-box max-w-2xs">
            <h3 class="text-lg font-bold">Añadir descanso</h3>
            <div>
              <form
                id="break-form"
                method="dialog"
                class="w-full max-w-2xs flex items-center flex-col"
              >
                <fieldset class="fieldset w-full">
                  <legend class="fieldset-legend">Nombre</legend>
                  <input
                    type="text"
                    class="input"
                    value="PVD"
                    name="input-name"
                    id="input-name"
                    required

                  />
                </fieldset>
                <fieldset class="fieldset w-full">
                  <legend class="fieldset-legend">Tiempo</legend>
                  <input
                    type="time"
                    class="input"
                    value="05:00"
                    name="input-time"
                    id="input-time"
                    required

                  />
                </fieldset>
                <fieldset class="fieldset w-full">
                  <legend class="fieldset-legend">Cantidad de descansos</legend>
                  <input
                    type="number"
                    class="input"
                    value="1"
                    name="input-breaks"
                    id="input-breaks"
                    required
                  />
                </fieldset>
                <div class="w-full flex gap-2 justify-end mt-3">
                  <button
                    type="button"
                    onclick="document.getElementById('my_modal_1').close()"
                    class="px-4 py-2 border border-red-500 bg-red-500 hover:border-red-600 hover:bg-red-600 rounded-sm text-white cursor-pointer active:scale-95 easy-in"
                  >
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    class="px-4 py-2 border border-teal-500 bg-teal-500 hover:border-teal-600 hover:bg-teal-600 rounded-sm text-white cursor-pointer active:scale-95 easy-in"
                  >
                    Guardar
                  </button>
                </div>
              </form>
            </div>
