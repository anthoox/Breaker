<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descansos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="h-screen bg-gray-300 flex items-center flex-col justify-center">
      <div
        class="h-[700px] flex flex-col items-center relative bg-gray-100 rounded-md max-w-md overflow-y-auto"
      >
        <div class="w-full py-8 px-12 flex flex-col items-center">
          <header>
            <h1 class="text-center">Total de descansos</h1>
            <div
              class="mt-2 border-2 border-white rounded-md px-15 py-4 text-4xl font-bold shadow-xl/10 bg-white"
            >
              <h2 id="total-global" class="text-center align-center">
                00:35:55
              </h2>
            </div>
          </header>

          <hr class="mt-12 border-gray-300 border w-4/5 max-w-2xs" />

          <main id="break-list" class="mt-3">

          </main>
        </div>

        <button
          class="absolute bottom-5 px-4 py-2 border border-teal-500 bg-teal-500 hover:border-teal-600 hover:bg-teal-600 rounded-sm text-white cursor-pointer active:scale-95 easy-in mb-10"
  onclick="abrirModalNuevo()"
        >
          <span>Agregar</span>
        </button>
        <dialog id="my_modal_1" class="modal">
          <div class="modal-box max-w-2xs">
            <h3 id="modal-title" class="text-lg font-bold">Añadir descanso</h3>
            <div>
              <form
                id="break-form"
                method="dialog"
                class="w-full max-w-2xs flex items-center flex-col"
              >
                <fieldset class="fieldset w-full">
                  <legend class="fieldset-legend">Nombre</legend>
                  <input
                    type="text"
                    class="input"
                    value="PVD"
                    name="input-name"
                    id="input-name"
                    required

                  />
                </fieldset>
<fieldset class="fieldset w-full">
  <legend class="fieldset-legend">Tiempo del descanso</legend>
  <div class="flex gap-2 items-center w-full">
    <div class="flex-1">
      <input type="number" id="input-min" class="input w-full text-center" placeholder="Min" min="0" />
    </div>
    <span class="font-bold">:</span>
    <div class="flex-1">
      <input type="number" id="input-sec" class="input w-full text-center" placeholder="Seg" min="0" max="59" />
    </div>
  </div>
</fieldset>
                <fieldset class="fieldset w-full">
                  <legend class="fieldset-legend">Cantidad de descansos</legend>
                  <input
                    type="number"
                    class="input"
                    value="1"
                    name="input-breaks"
                    id="input-breaks"
                    required
                  />
                </fieldset>
                <div id="cnt-buttons" class="w-7/8 flex gap-10 justify-center mt-3">
                  <button id="btn-eliminar-modal" type="button" onclick="eliminarActual()"
                    class="flex flex-col items-center justify-center hidden cursor-pointer active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                      <path fill="#999999"
                        d="M7 21q-.825 0-1.412-.587T5 19V6q-.425 0-.712-.288T4 5t.288-.712T5 4h4q0-.425.288-.712T10 3h4q.425 0 .713.288T15 4h4q.425 0 .713.288T20 5t-.288.713T19 6v13q0 .825-.587 1.413T17 21zM17 6H7v13h10zm-6.287 10.713Q11 16.425 11 16V9q0-.425-.288-.712T10 8t-.712.288T9 9v7q0 .425.288.713T10 17t.713-.288m4 0Q15 16.426 15 16V9q0-.425-.288-.712T14 8t-.712.288T13 9v7q0 .425.288.713T14 17t.713-.288M7 6v13z" />
                    </svg>
                    <span class="text-xs text-gray-500 font-semibold">Eliminar</span>
                  </button>

                  <button
                    type="button"
                    onclick="document.getElementById('my_modal_1').close()"
                    class="flex flex-col items-center justify-center text-white cursor-pointer active:scale-95 easy-in"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                      <path fill="#999999"
                        d="m12 13.4l2.9 2.9q.275.275.7.275t.7-.275t.275-.7t-.275-.7L13.4 12l2.9-2.9q.275-.275.275-.7t-.275-.7t-.7-.275t-.7.275L12 10.6L9.1 7.7q-.275-.275-.7-.275t-.7.275t-.275.7t.275.7l2.9 2.9l-2.9 2.9q-.275.275-.275.7t.275.7t.7.275t.7-.275zm0 8.6q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22m0-2q3.35 0 5.675-2.325T20 12t-2.325-5.675T12 4T6.325 6.325T4 12t2.325 5.675T12 20m0-8" />
                    </svg>
                    <span class="text-xs text-gray-500 font-semibold">Cancelar</span>
                  </button>

                  <button
                    type="submit"
                    class="flex flex-col items-center justify-center cursor-pointer active:scale-95 easy-in"
                  >
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#999999"
                      d="M3 5a2 2 0 0 1 2-2h11.586A2 2 0 0 1 18 3.586l2.707 2.707A1 1 0 0 1 21 7v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zm6 14h6v-6H9zm8 0h2V7.414l-2-2V7a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V5H5v14h2v-6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2zM9 5v2h6V5z" />
                  </svg>  
                    <span class="text-xs text-gray-500 font-semibold">Guardar</span>

                  </button>
                </div>
              </form>
            </div>
          </div>
        </dialog>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
